defaults:
  notes: Edit prompt and optional rotation per key. Rotation is clockwise degrees
    and should be one of 0,90,180,270.
sprites:
  tile.space:
    prompt: Top-down pixel art. space station. Style of rimworld. space tile for a station game. Full square coverage
      edge-to-edge with dark void star texture, seamless on all four edges, no
      border, no frame, no text, readable at 18x18.
    rotation: 0
  tile.floor:
    prompt: Top-down pixel art. space station. Style of rimworld. space station. Simple, repeating metal floor tile. Full-bleed square tile,
      edge-to-edge coverage, seamless wrap on all four edges, no frame, no
      margin, no border, muted cool metal paneling, readable at 18x18.
    rotation: 0
  tile.wall:
    prompt: Top-down pixel art. space station. Style of rimworld. station wall tile base fallback. Full-bleed square
      tile, edge-to-edge coverage, seamless wrap on all four edges, no frame, no
      margin, no border, structural sci-fi wall details, readable at 18x18.
    rotation: 90
  tile.wall.solo:
    prompt: Top-down pixel art. space station. Style of rimworld. Space station exterior hull metal wall. tile variant SOLO (isolated pillar-like wall).
      Fill entire square edge-to-edge, no empty border, no frame, no margin,
      seamless-compatible style, readable at 18x18.
    rotation: 90
  tile.wall.end:
    prompt: Top-down pixel art. space station. Style of rimworld. Space station exterior hull metal wall. tile variant END (one connected side, intended
      for rotation). Fill entire square edge-to-edge, no empty border, no frame,
      no margin, seamless-compatible style, readable at 18x18.
    rotation: 90
  tile.wall.straight:
    prompt: Top-down pixel art. space station. Style of rimworld. Space station exterior hull metal wall. tile variant STRAIGHT (opposite-side connection,
      intended for rotation). Fill entire square edge-to-edge, no empty border,
      no frame, no margin, seamless-compatible style, readable at 18x18.
    rotation: 90
  tile.wall.corner:
    prompt: Top-down pixel art. space station. Style of rimworld. Space station exterior hull metal wall. tile variant CORNER (adjacent-side corner connection,
      intended for rotation). Fill entire square edge-to-edge, no empty border,
      no frame, no margin, seamless-compatible style, readable at 18x18.
    rotation: -90
  tile.wall.tee:
    prompt: Top-down pixel art. space station. Style of rimworld. Space station exterior hull metal wall. tile variant TEE (three-side tee T connection,
      intended for rotation). Fill entire square edge-to-edge, no empty border,
      no frame, no margin, seamless-compatible style, readable at 18x18.
    rotation: 90
  tile.wall.cross:
    prompt: Top-down pixel art. space station. Style of rimworld. Space station exterior hull metal wall. tile variant CROSS (four-side plus sign inter connection). Fill
      entire square edge-to-edge, no empty border, no frame, no margin,
      seamless-compatible style, readable at 18x18.
    rotation: 90
  # Dual-tilemap wall variants (RimWorld/Prison Architect technique).
  # Each sprite covers 4 CORNER QUADRANTS of a graphics-layer tile that
  # STRADDLES 4 world cells. Reference authoring spec lives at
  # /tmp/rimworld-test/walls-dt-template.txt — each prompt below matches
  # the canonical TL-biased orientation (rotations resolved at runtime).
  tile.wall.dt.empty:
    prompt: |-
      Top-down pixel art, space station, rimworld style. Dual-tilemap wall
      variant EMPTY - fully transparent cell (magenta FF00FF chroma). No
      wall body. Cool station palette context.
    rotation: 0
  tile.wall.dt.single_corner:
    prompt: |-
      Top-down pixel art, space station, rimworld style. Dual-tilemap wall
      variant SINGLE_CORNER - only top-left quadrant filled with cool
      steel-blue wall body (2a3040), cool-white rim-light (d8e0ea) on the
      two exterior edges of that quadrant. Other three quadrants magenta
      chroma. No bolts, no seams, seamless wall body.
    rotation: 0
  tile.wall.dt.edge:
    prompt: |-
      Top-down pixel art, space station, rimworld style. Dual-tilemap wall
      variant EDGE - top half (TL+TR) filled with cool steel-blue wall
      body (2a3040). Bottom half magenta chroma. Cool-white rim-light
      (d8e0ea) on the bottom edge of the filled half. No decorative panels.
    rotation: 0
  tile.wall.dt.saddle:
    prompt: |-
      Top-down pixel art, space station, rimworld style. Dual-tilemap wall
      variant SADDLE - diagonal pattern, TL+BR quadrants filled with cool
      steel-blue wall body (2a3040), TR+BL magenta chroma. Cool-white
      rim-lights (d8e0ea) on inner edges of each filled quadrant.
    rotation: 0
  tile.wall.dt.inner_corner:
    prompt: |-
      Top-down pixel art, space station, rimworld style. Dual-tilemap wall
      variant INNER_CORNER - three quadrants filled (TL+TR+BL) in cool
      steel-blue wall body (2a3040). BR quadrant magenta chroma. Cool-white
      rim-lights (d8e0ea) on the concave edges facing empty BR.
    rotation: 0
  tile.wall.dt.full:
    prompt: |-
      Top-down pixel art, space station, rimworld style. Dual-tilemap wall
      variant FULL - entire cell filled with continuous cool steel-blue
      wall body (2a3040). No rim-lights (every edge meets another wall).
      Seamless texture. No bolts, no panel seams.
    rotation: 0
  tile.dock.middle:
    prompt: Top-down pixel art. space station. Style of rimworld. opening in space station intended for ships to dock. air lock opening. docking tile. Full-bleed square tile with docking
