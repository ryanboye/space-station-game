# Reusable prompt macros for gpt-image-2 sprite generation.
# Usage: prompt templates reference `{MACRO_NAME}` tokens which get
# substituted by build-gen-prompt.mjs before sending to the API.
#
# Owner's lane: awfml/tinyclaw/seb tweak vocabulary here, no code PR needed.
# BMO uses them in gen prompts so camera-angle / palette drift between
# iterations stops being a source of regressions.

# ---- CAMERA MACROS ----

CAMERA_PURE_TOPDOWN: |
  Camera is DIRECTLY ABOVE, pointing straight down, 0° tilt.
  You see ONLY the top surface of each object — NO side faces, NO 3/4 view, NO
  isometric projection. If any vertical side face is visible, the image is
  WRONG. Pure top-down orthographic, like a blueprint or floor plan.

CAMERA_SLIGHT_DEPTH: |
  Camera is directly above with a tiny ~5° depth hint expressed through
  rim-light only — a thin highlight on the top edge that suggests height.
  No 3/4 projection, no visible side faces, no isometric tilt. The depth
  cue is ONLY a lighting suggestion, not a perspective change.

CAMERA_PAWN: |
  Camera DIRECTLY ABOVE each character. "Floating head" style — you see
  the top of the head (hair/hat) as a small circle, with the rounded body
  silhouette beneath showing hints of shoulders and arms. NO side view,
  NO 3/4 projection, NO JRPG walking-sprite orientation. Think RimWorld
  "pawn" or Prison Architect "inmate" sprite.

# ---- PALETTE MACROS ----

PALETTE_STATION_COOL: |
  COOL-FIRST palette — deep blues + greys dominate. Base: charcoal
  (#1a1e28) + steel blue (#2a3040). Highlights: COOL-WHITE (#d8e0ea) for
  rim-lights — NOT amber, NOT warm-yellow. Warm amber (#c9a84c) is
  RESERVED for true hazard/alert moments ONLY: dock hazard stripes
  (yellow+black), reactor core glow (orange center), alert lights /
  warning signals, serving-station warmer-tray glow, wall-light module
  (the one object whose JOB is to be warm). DO NOT sprinkle amber as
  decorative "trim" on walls, floors, furniture, agents. Rimworld's
  walls + floors + furniture are mostly COOL GREYS with color-coded
  accents ONLY on functional/hazard tiles. When in doubt, stay grey. The
  aggregate palette read of a tiled station must be COOL, not warm.
  (Seb's observation 2026-04-23: warm-amber trim on walls accumulates
  into a brown-aggregate station even when isolated sprites look fine.)

PALETTE_NEUTRAL_FLOOR: |
  Dark steel floor base (#2a2d34). Subtle brushed-metal micro-texture.
  Optional very faint tint by room type but DO NOT SATURATE — 90% dark
  steel, 10% tint maximum. No center-glow, no dominating color, no
  directional pattern.

# ---- STYLE / RENDERING MACROS ----

STYLE_RIMWORLD_PA: |
  Strict RimWorld + Prison Architect aesthetic. Clean crisp pixel edges,
  NO painterly blur, NO antialiasing, NO soft gradients on geometry.
  Chunky pixel-art style but clean silhouettes. Readable at 64×64
  downsample.

TILEABLE_FLOOR: |
  Seamlessly tileable — edges match opposite edges. NO corner bolts, NO
  edge borders, NO directional patterns. When placed in a 3×3 grid the
  seams are invisible.

FLOOR_WITH_ROOM_MOTIF: |
  Dark neutral metal-plate base fills 80% of the tile (matches tile.floor
  vocabulary for family cohesion). The remaining 20% is a small room-type
  motif/icon at ~25% tile size, subtle glow tint, positioned off-center so
  tiling still reads as texture not a 5×5 grid of repeated decals.
  Room-type color keys: reactor=amber glow + hex-pattern hint;
  security=blue+red striped accent or lock; brig=red diagonal bands;
  clinic=white base + red-cross subtle motif; hydroponics=green grid /
  grow-light hint; workshop=orange + gear icon. CRITICAL: motif subtle
  enough the floor still TILES — no room-sized icon, no centered decal.
  Every room-floor tile on the SAME dark-steel base — family reads as
  variations-on-a-theme, not unrelated styles.

CAMERA_FLAT_FLOOR_OBJECT: |
  This object LIES FLAT on the floor (bed, couch, table, pallet, market
  stall laying out goods). Camera DIRECTLY ABOVE, pointing straight down,
  0° tilt. Render the top-surface silhouette — a bed shows pillow +
  blanket from above, a table shows its tabletop + chair tops, a couch
  shows cushion-tops. NO side faces, NO 3/4 view, NO visible height.

CAMERA_STANDING_OBJECT: |
  This object STANDS UP vertically from the floor (arcade cabinet, stove,
  wall-light, shower cubicle, serving station counter, storage rack
  shelving, terminal monitor, workbench with vice). Camera from a
  slight-front angle showing the FRONT face of the object — the face the
  colonist would interact with. RimWorld's stove/arcade/workbench look.
  NOT pure top-down (a stove from above = just 4 circles, unreadable),
  NOT full 3/4 isometric. Slight front-3/4, readable functional face
  visible. Subtle drop shadow on floor beneath. When in doubt, ask "does
  a colonist LOOK DOWN at this or LOOK AT its front?"

WALL_DEPTH: |
  Wall has visible semi-3D depth: top face rim-lit with COOL-WHITE
  highlight (not amber — amber accumulates warm across tiled station).
  Subtle drop shadow on south edge cast onto adjacent floor. Side face
  hint on south + east edges but the wall remains READ as top-down —
  depth is a lighting effect, not a projection change.

# ---- SHEET / CROPPING MACROS ----

SHEET_GRID_STRICT: |
  Grid layout is NON-NEGOTIABLE: cells must be exactly uniform, exactly
  equal-width magenta gutters. No text labels, no borders. The 40px
  magenta gutter between cells is uniform pure-magenta (#FF00FF) for
  chroma-keying during post-processing. Each cell contents must be
  centered within its cell.
