name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and Sim Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate sprite atlas (advisory)
        continue-on-error: true
        run: |
          if [ -f public/assets/sprites/atlas.json ] && [ -f public/assets/sprites/atlas.png ]; then
            npm run sprites:validate:v1
          else
            echo "No sprite atlas present yet; skipping sprite validation."
          fi

      - name: Build
        run: npm run build

      - name: Run sim tests
        run: npm run test:sim

      - name: Install uv (for check-mobile.py)
        uses: astral-sh/setup-uv@v6

      - name: Mobile baseline gate (advisory)
        # Advisory only — prints PASS/FAIL per checklist item against the
        # built dist/index.html, but does NOT fail CI. Once the build
        # reliably passes all 9 items we can flip `continue-on-error` off
        # and make it a hard gate. See tools/check-mobile.py comments +
        # /root/seb/skills/sebland-app/SKILL.md for the full checklist.
        continue-on-error: true
        run: |
          if [ -f dist/index.html ]; then
            uv run tools/check-mobile.py dist/index.html
          else
            echo "dist/index.html not found after build — skipping mobile gate."
          fi
