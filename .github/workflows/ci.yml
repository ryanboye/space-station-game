name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and Sim Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate sprite atlas (optional pilot gate)
        run: |
          if [ -f public/assets/sprites/atlas.json ] && [ -f public/assets/sprites/atlas.png ]; then
            npm run sprites:validate:test
          else
            echo "No sprite atlas present yet; skipping sprite validation."
          fi

      - name: Build
        run: npm run build

      - name: Run sim tests
        run: npm run test:sim
